name: Java Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile search files
        run: javac Algorithm.java LinearSearch.java BinarySearch.java SearchTest.java

      - name: Run SearchTest
        run: java SearchTest
